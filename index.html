<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Bewellery Etoile</title>
<style>
  :root {
    --gold: #b8925a;
    --text-primary: #1c1c1c;
    --text-secondary: #55524d;
    --bg: #fdfcfb;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--bg);
    color: var(--text-primary);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    text-align: center;
    padding: 24px;
  }
  h1 {
    font-size: 32px;
    margin-bottom: 8px;
  }
  p {
    color: var(--text-secondary);
    margin-bottom: 32px;
  }
  .links a {
    display: inline-block;
    margin: 0 12px;
    color: var(--gold);
    font-weight: 600;
    text-decoration: none;
    font-size: 16px;
  }
  .links a:hover {
    text-decoration: underline;
  }
</style>
</head>
<body>
  <div>
    <h1>Bewellery Etoile</h1>
    <p>Elegant jewelry, delivered.</p>
    <div class="links">
      <a href="/privacy">Privacy Policy</a>
      <a href="/terms">Terms &amp; Conditions</a>
    </div>
  </div>
</body>
</html>
